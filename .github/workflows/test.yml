name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # Scope fmt/lint/test to the portable crates. The Tauri GUI
      # (ghost-gui/src-tauri) needs per-OS system WebView deps (webkit2gtk on
      # Linux etc.) and carries no tests; it is compiled and bundled by
      # release.yml on macOS + Windows instead.
      - name: Check formatting
        run: cargo fmt -p ghost-lib -p ghost-cli --check

      - name: Run clippy
        run: cargo clippy -p ghost-lib -p ghost-cli -- -D warnings

      - name: Run tests
        run: cargo test -p ghost-lib -p ghost-cli
